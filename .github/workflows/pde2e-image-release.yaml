name: pde2e-image release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
        type: string

env:
  IMAGE: ghcr.io/podman-desktop/pde2e-image

jobs:
  release:
    name: Build, scan & release pde2e-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Validate release version
        shell: bash
        run: |
          [[ '${{ inputs.version }}' =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "Invalid version: '${{ inputs.version }}'" >&2
            exit 1
          }

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to ghcr.io
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        working-directory: pde2e-image
        run: |
          systemctl --user enable --now podman.socket
          podman build -t ${{ env.IMAGE }}-darwin:v${{ inputs.version }} \
            -f Containerfile --build-arg=OS=darwin \
            --label org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }} \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            --label org.opencontainers.image.version=${{ inputs.version }} .
          podman build -t ${{ env.IMAGE }}-windows:v${{ inputs.version }} \
            -f Containerfile --build-arg=OS=windows \
            --label org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }} \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            --label org.opencontainers.image.version=${{ inputs.version }} .
          podman build -t ${{ env.IMAGE }}-rhel:v${{ inputs.version }} \
            -f Containerfile --build-arg=OS=rhel \
            --label org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }} \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            --label org.opencontainers.image.version=${{ inputs.version }} .

      - name: Scan darwin image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}-darwin:v${{ inputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Scan windows image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}-windows:v${{ inputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Scan rhel image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}-rhel:v${{ inputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Push darwin image
        run: |
          podman push ${{ env.IMAGE }}-darwin:v${{ inputs.version }}
          podman tag ${{ env.IMAGE }}-darwin:v${{ inputs.version }} ${{ env.IMAGE }}-darwin:latest
          podman push ${{ env.IMAGE }}-darwin:latest

      - name: Push windows image
        run: |
          podman push ${{ env.IMAGE }}-windows:v${{ inputs.version }}
          podman tag ${{ env.IMAGE }}-windows:v${{ inputs.version }} ${{ env.IMAGE }}-windows:latest
          podman push ${{ env.IMAGE }}-windows:latest

      - name: Push rhel image
        run: |
          podman push ${{ env.IMAGE }}-rhel:v${{ inputs.version }}
          podman tag ${{ env.IMAGE }}-rhel:v${{ inputs.version }} ${{ env.IMAGE }}-rhel:latest
          podman push ${{ env.IMAGE }}-rhel:latest
