name: pde2e-image nightly

on:
  push:
    branches: [main]
    paths:
      - 'pde2e-image/**'

env:
  IMAGE: ghcr.io/podman-desktop/pde2e-image

concurrency:
  group: pde2e-image-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build, scan & push pde2e-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to ghcr.io
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build images
        working-directory: pde2e-image
        run: |
          systemctl --user enable --now podman.socket
          podman build -t ${{ env.IMAGE }}-darwin:${{ env.SHORT_SHA }} \
            -f Containerfile --build-arg=OS=darwin \
            --label org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }} \
            --label org.opencontainers.image.revision=${{ github.sha }} .
          podman build -t ${{ env.IMAGE }}-windows:${{ env.SHORT_SHA }} \
            -f Containerfile --build-arg=OS=windows \
            --label org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }} \
            --label org.opencontainers.image.revision=${{ github.sha }} .
          podman build -t ${{ env.IMAGE }}-rhel:${{ env.SHORT_SHA }} \
            -f Containerfile --build-arg=OS=rhel \
            --label org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }} \
            --label org.opencontainers.image.revision=${{ github.sha }} .

      - name: Scan darwin image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}-darwin:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Scan windows image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}-windows:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Scan rhel image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}-rhel:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Push darwin image
        run: |
          podman push ${{ env.IMAGE }}-darwin:${{ env.SHORT_SHA }}
          podman tag ${{ env.IMAGE }}-darwin:${{ env.SHORT_SHA }} ${{ env.IMAGE }}-darwin:nightly
          podman push ${{ env.IMAGE }}-darwin:nightly

      - name: Push windows image
        run: |
          podman push ${{ env.IMAGE }}-windows:${{ env.SHORT_SHA }}
          podman tag ${{ env.IMAGE }}-windows:${{ env.SHORT_SHA }} ${{ env.IMAGE }}-windows:nightly
          podman push ${{ env.IMAGE }}-windows:nightly

      - name: Push rhel image
        run: |
          podman push ${{ env.IMAGE }}-rhel:${{ env.SHORT_SHA }}
          podman tag ${{ env.IMAGE }}-rhel:${{ env.SHORT_SHA }} ${{ env.IMAGE }}-rhel:nightly
          podman push ${{ env.IMAGE }}-rhel:nightly
