name: pde2e-image PR check

on:
  pull_request:
    branches: [main]
    paths:
      - 'pde2e-image/**'
      - '.github/workflows/pde2e-image-pr.yaml'

env:
  IMAGE: ghcr.io/podman-desktop/pde2e-image

jobs:
  build:
    name: Build & scan pde2e-image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build images
        working-directory: pde2e-image
        run: |
          systemctl --user enable --now podman.socket
          podman build -t ${{ env.IMAGE }}-darwin:pr -f Containerfile --build-arg=OS=darwin .
          podman build -t ${{ env.IMAGE }}-windows:pr -f Containerfile --build-arg=OS=windows .
          podman build -t ${{ env.IMAGE }}-rhel:pr -f Containerfile --build-arg=OS=rhel .

      - name: Scan darwin image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}-darwin:pr
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Scan windows image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}-windows:pr
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Scan rhel image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}-rhel:pr
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
